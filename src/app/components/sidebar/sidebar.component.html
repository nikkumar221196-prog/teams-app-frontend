<div class="sidebar">
  <div class="sidebar-header">
    <div class="header-top">
      <span class="title">Chat</span>
      <div class="header-actions">
        <button class="icon-btn" title="Filter">🔍</button>
        <button class="icon-btn" title="New chat">✏️</button>
      </div>
    </div>
  </div>

  <div class="filter-tabs">
    <button class="tab active">Recent</button>
    <button class="tab">Pinned</button>
  </div>

  <div class="user-list">
    <div *ngFor="let user of users"
         class="user-item"
         [class.active]="selectedUser?.name === user.name"
         (click)="select(user)">
      <div class="avatar">
        {{ getInitial(user.name) }}
        <span class="status-dot online"></span>
      </div>
      <div class="user-info">
        <div class="user-header">
          <span class="user-name">{{ user.name }}</span>
          <span class="time" *ngIf="user.last_seen">{{ formatTime(user.last_seen) }}</span>
        </div>
        <div class="message-preview">
          <span class="preview-text">{{ user.lastMessage || 'Start a conversation' }}</span>
          <span *ngIf="getUnreadCount(user.name) > 0" class="unread-badge">
            {{ getUnreadCount(user.name) }}
          </span>
        </div>
      </div>
    </div>

    <div *ngIf="users.length === 0" class="no-users">
      <span class="empty-icon">💬</span>
      <p>No other users online</p>
    </div>
  </div>
</div>
