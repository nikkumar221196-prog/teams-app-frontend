<div class="app-shell">
  <!-- Left nav rail -->
  <nav class="nav-rail" [class.hidden]="isMobile() && showChat">
    <div class="nav-logo">T</div>
    <button class="nav-btn active" title="Chat">
      <span class="icon">💬</span><span class="label">Chat</span>
    </button>
    <div class="nav-spacer"></div>
    <div class="nav-avatar" [title]="currentUser" (click)="showLogoutPopup = true">
      {{ currentUser.charAt(0).toUpperCase() }}
    </div>
  </nav>

  <!-- Sidebar: hidden on mobile when chat is open -->
  <app-sidebar
    *ngIf="!isMobile() || !showChat"
    [users]="users"
    [currentUser]="currentUser"
    [selectedUser]="selectedUser"
    [unreadCounts]="unreadCounts"
    (userSelected)="selectUser($event)">
  </app-sidebar>

  <!-- Main chat area -->
  <main class="main-area" *ngIf="!isMobile() || showChat">
    @if (selectedUser) {
      <app-chat
        [currentUser]="currentUser"
        [selectedUser]="selectedUser"
        [allMessages]="allMessages"
        [isMobile]="isMobile()"
        (startCall)="activeCall = $event"
        (deleteMessage)="deleteMessage($event)"
        (goBack)="backToSidebar()">
      </app-chat>
    } @else {
      <div class="empty-state">
        <span>👋</span>
        <p>Select a person to start chatting</p>
      </div>
    }
  </main>

  <!-- Call overlay -->
  @if (activeCall) {
    <app-call
      [callData]="activeCall"
      [currentUser]="currentUser"
      (callEnd)="onCallEnd()">
    </app-call>
  }

  <!-- Logout popup -->
  @if (showLogoutPopup) {
    <div class="logout-overlay" (click)="showLogoutPopup = false">
      <div class="logout-popup" (click)="$event.stopPropagation()">
        <h3>Sign out</h3>
        <p>Are you sure you want to sign out?</p>
        <div class="popup-actions">
          <button class="btn-cancel" (click)="showLogoutPopup = false">Cancel</button>
          <button class="btn-logout" (click)="logout()">Sign out</button>
        </div>
      </div>
    </div>
  }
</div>
